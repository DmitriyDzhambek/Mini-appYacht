<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeloPath - Зарабатывай на активности</title>
    <meta name="description" content="Mini App для отслеживания физической активности с наградами">
    
    <!-- Open Graph для Telegram -->
    <meta property="og:title" content="VeloPath - Зарабатывай на активности">
    <meta property="og:description" content="Mini App для отслеживания активности с наградами">
    <meta property="og:image" content="/assets/logo.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mini-app-yacht.vercel.app">
    
    <!-- Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#1a1a2e;--text:#fff;--primary:#007bff;--secondary:#0f0f23}
        body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
        .container{max-width:100%;margin:0 auto;padding:20px 16px 80px}
        .header{text-align:center;margin-bottom:30px}
        .header h1{font-size:24px;margin-bottom:8px}
        .header p{opacity:0.7;font-size:14px}
        .screen{display:none}
        .screen.active{display:block}
        .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}
        .card{background:rgba(255,255,255,0.1);border-radius:12px;padding:16px;text-align:center}
        .card h3{font-size:12px;opacity:0.7;margin-bottom:8px}
        .card .value{font-size:20px;font-weight:700}
        .btn{background:var(--primary);color:white;border:none;padding:16px;border-radius:12px;width:100%;font-size:16px;font-weight:600;cursor:pointer;margin:10px 0;transition:opacity 0.2s}
        .btn:hover{opacity:0.8}
        .btn:active{opacity:0.6}
        .btn.secondary{background:rgba(255,255,255,0.1)}
        .btn.success{background:#28a745}
        .btn.danger{background:#dc3545}
        .nav{position:fixed;bottom:0;left:0;right:0;background:var(--secondary);padding:12px}
        .nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
        .nav-btn{background:none;border:none;color:var(--text);padding:8px;text-align:center;cursor:pointer;border-radius:8px;transition:background 0.2s}
        .nav-btn:hover{background:rgba(255,255,255,0.1)}
        .nav-btn.active{background:var(--primary)}
        .nav-btn span{display:block;font-size:18px;margin-bottom:4px}
        .nav-btn p{font-size:10px;margin:0}
        .section{background:rgba(255,255,255,0.05);border-radius:12px;padding:16px;margin-bottom:16px}
        .section h3{margin-bottom:12px;font-size:16px}
        .empty-state{text-align:center;padding:40px 16px;opacity:0.5;font-style:italic}
        @media (max-width:480px){.grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>VeloPath</h1>
            <p>Зарабатывай награды за активность</p>
        </header>

        <div id="home" class="screen active">
            <div class="grid">
                <div class="card">
                    <h3>Шаги сегодня</h3>
                    <div class="value" id="steps">0</div>
                </div>
                <div class="card">
                    <h3>Км сегодня</h3>
                    <div class="value" id="km">0.00</div>
                </div>
                <div class="card">
                    <h3>Stars</h3>
                    <div class="value" id="stars">0</div>
                </div>
                <div class="card">
                    <h3>Рубли</h3>
                    <div class="value" id="rub">0</div>
                </div>
            </div>
            <button class="btn" onclick="alert('Трекинг скоро будет доступен!')">🚴 Начать трекинг</button>
            <button class="btn secondary" onclick="alert('Монетизация в разработке!')">💰 Заработать награды</button>
        </div>

        <nav class="nav">
            <div class="nav-grid">
                <button class="nav-btn active" onclick="showScreen('home')">
                    <span>🏠</span>
                    <p>Главная</p>
                </button>
                <button class="nav-btn" onclick="showScreen('tracker')">
                    <span>📍</span>
                    <p>Трекер</p>
                </button>
                <button class="nav-btn" onclick="showScreen('wallet')">
                    <span>💳</span>
                    <p>Кошелек</p>
                </button>
                <button class="nav-btn" onclick="showScreen('stats')">
                    <span>📊</span>
                    <p>Статистика</p>
                </button>
            </div>
        </nav>
    </div>

    <script>
        // Состояние
        let state = {
            steps: Math.floor(Math.random() * 5000),
            km: (Math.random() * 10).toFixed(2),
            stars: Math.floor(Math.random() * 100),
            rub: Math.floor(Math.random() * 1000)
        };

        // Telegram WebApp
        let tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand();
            tg.ready();
            if (tg.themeParams) {
                document.documentElement.style.setProperty('--bg', tg.themeParams.bg_color || '#1a1a2e');
                document.documentElement.style.setProperty('--text', tg.themeParams.text_color || '#ffffff');
                document.documentElement.style.setProperty('--primary', tg.themeParams.button_color || '#007bff');
            }
            
            // Показываем сообщение о готовности
            tg.showAlert('VeloPath Mini App готов к работе! 🎉');
        }

        // Навигация
        function showScreen(screen) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screen).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.target.closest('.nav-btn')?.classList.add('active');
        }

        // Обновление дисплея
        function updateDisplay() {
            document.getElementById('steps').textContent = Math.floor(state.steps).toLocaleString();
            document.getElementById('km').textContent = state.km;
            document.getElementById('stars').textContent = state.stars;
            document.getElementById('rub').textContent = state.rub;
        }

        // Инициализация
        updateDisplay();
        
        // Имитация активности
        setInterval(() => {
            state.steps += Math.floor(Math.random() * 5) + 1;
            state.km = (parseFloat(state.km) + Math.random() * 0.1).toFixed(2);
            state.stars += Math.floor(Math.random() * 3);
            state.rub += Math.floor(Math.random() * 10);
            updateDisplay();
        }, 3000);
    </script>
</body>
</html>
