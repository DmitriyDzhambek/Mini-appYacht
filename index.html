<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeloPath</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h1>VeloPath Mini App</h1>
    <p>Зарабатывай награды за активность</p>
    <p>Шаги: <span id="steps">0</span></p>
    <p>Stars: <span id="stars">0</span></p>
    <button onclick="alert('Трекинг!')">🚴 Начать</button>
    <script>
        let tg=window.Telegram?.WebApp;
        if(tg){tg.expand();tg.ready();}
        let steps=0,stars=0;
        setInterval(()=>{steps+=1;stars+=1;document.getElementById('steps').textContent=steps;document.getElementById('stars').textContent=stars;},1000);
    </script>
</body>
</html>
