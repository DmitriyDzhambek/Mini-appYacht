<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeloPath</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:system-ui,sans-serif;
            background:linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color:#fff;
            min-height:100vh;
            padding:20px;
            position:relative;
            overflow:hidden;
        }
        .sea-bg{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:linear-gradient(180deg, rgba(15,52,96,0.3) 0%, rgba(22,33,62,0.5) 100%);
            z-index:-1;
        }
        .waves{
            position:fixed;
            bottom:0;
            left:0;
            width:200%;
            height:100px;
            background:linear-gradient(90deg, rgba(0,150,255,0.1) 0%, rgba(0,100,200,0.15) 50%, rgba(0,150,255,0.1) 100%);
            animation:wave 8s linear infinite;
            z-index:-1;
        }
        .waves::before{
            content:'';
            position:absolute;
            top:20px;
            left:0;
            width:100%;
            height:100%;
            background:linear-gradient(90deg, rgba(0,120,220,0.08) 0%, rgba(0,80,180,0.12) 50%, rgba(0,120,220,0.08) 100%);
            animation:wave 6s linear infinite reverse;
        }
        @keyframes wave{
            0%{transform:translateX(0);}
            100%{transform:translateX(-50%);}
        }
        .yacht-icon{
            position:fixed;
            bottom:60px;
            right:20px;
            font-size:40px;
            opacity:0.3;
            animation:float 4s ease-in-out infinite;
            z-index:-1;
        }
        @keyframes float{
            0%,100%{transform:translateY(0) rotate(-5deg);}
            50%{transform:translateY(-10px) rotate(5deg);}
        }
        .container{
            max-width:600px;
            margin:0 auto;
            position:relative;
            z-index:1;
        }
        h1{
            text-align:center;
            margin-bottom:10px;
            font-size:28px;
            background:linear-gradient(90deg, #00d4ff, #0099ff);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-clip:text;
        }
        .subtitle{
            text-align:center;
            margin-bottom:30px;
            opacity:0.8;
            font-size:16px;
        }
        .card{
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(10px);
            border-radius:16px;
            padding:24px;
            margin-bottom:20px;
            border:1px solid rgba(255,255,255,0.1);
            box-shadow:0 8px 32px rgba(0,0,0,0.2);
        }
        .stat-row{
            display:flex;
            justify-content:space-between;
            margin-bottom:15px;
        }
        .stat-item{
            text-align:center;
            flex:1;
        }
        .stat-value{
            font-size:32px;
            font-weight:700;
            background:linear-gradient(90deg, #00d4ff, #00ff88);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-clip:text;
        }
        .stat-label{
            font-size:12px;
            opacity:0.7;
            margin-top:5px;
        }
        .btn{
            background:linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            color:#fff;
            border:none;
            padding:18px;
            border-radius:12px;
            width:100%;
            font-size:18px;
            font-weight:600;
            cursor:pointer;
            margin:15px 0;
            box-shadow:0 4px 15px rgba(0,212,255,0.3);
            transition:all 0.3s ease;
        }
        .btn:hover{
            transform:translateY(-2px);
            box-shadow:0 6px 20px rgba(0,212,255,0.4);
        }
        .btn:active{
            transform:translateY(0);
        }
        .sound-toggle{
            position:fixed;
            top:20px;
            right:20px;
            background:rgba(255,255,255,0.1);
            border:none;
            color:#fff;
            padding:10px;
            border-radius:50%;
            cursor:pointer;
            font-size:20px;
            z-index:100;
        }
    </style>
</head>
<body>
    <div class="sea-bg"></div>
    <div class="waves"></div>
    <div class="yacht-icon">⛵</div>
    
    <button class="sound-toggle" onclick="toggleSound()" id="soundBtn">🔇</button>
    
    <div class="container">
        <h1>VeloPath</h1>
        <p class="subtitle">Зарабатывай награды за активность</p>
        
        <div class="card">
            <div class="stat-row">
                <div class="stat-item">
                    <div class="stat-value" id="steps">0</div>
                    <div class="stat-label">Шаги</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="stars">0</div>
                    <div class="stat-label">Stars</div>
                </div>
            </div>
        </div>
        
        <button class="btn" onclick="alert('Трекинг активирован!')">🚴 Прощай лень</button>
    </div>
    
    <script>
        let tg=window.Telegram?.WebApp;
        if(tg){tg.expand();tg.ready();}
        
        let steps=0,stars=0;
        let soundEnabled=false;
        let audioContext;
        
        function toggleSound(){
            soundEnabled=!soundEnabled;
            document.getElementById('soundBtn').textContent=soundEnabled?'🔊':'🔇';
            
            if(soundEnabled){
                if(!audioContext){
                    audioContext=new(window.AudioContext||window.webkitAudioContext)();
                }
                playSeaSound();
            }
        }
        
        function playSeaSound(){
            if(!soundEnabled||!audioContext)return;
            
            const oscillator=audioContext.createOscillator();
            const gainNode=audioContext.createGain();
            
            oscillator.type='sine';
            oscillator.frequency.setValueAtTime(100+Math.random()*50,audioContext.currentTime);
            gainNode.gain.setValueAtTime(0.05,audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01,audioContext.currentTime+2);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.start();
            oscillator.stop(audioContext.currentTime+2);
            
            setTimeout(playSeaSound,2000+Math.random()*1000);
        }
        
        setInterval(()=>{
            steps+=Math.floor(Math.random()*3)+1;
            stars+=Math.floor(Math.random()*2);
            document.getElementById('steps').textContent=steps.toLocaleString();
            document.getElementById('stars').textContent=stars.toLocaleString();
        },1000);
    </script>
</body>
</html>
